<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYK Wallet Share — Tracking Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="auth-bar" id="auth-bar"></div>
      <h1 id="project-name">NYK Wallet Share — โครงการ 3 เดือน</h1>
      <p id="last-updated"></p>
    </header>

    <div class="overdue-banner" id="overdue-banner" style="display:none"></div>

    <div class="progress-wrap">
      <div class="progress-labels">
        <span>ความคืบหน้าโครงการ</span>
        <span id="progress-count">0 / 12 งาน (0%)</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="add-task-panel" id="add-task-panel"></div>

    <div class="view-toggle">
      <button id="view-board-btn" class="active">Board</button>
      <button id="view-timeline-btn">Timeline</button>
    </div>

    <div class="board" id="board"></div>
    <div class="timeline" id="timeline" style="display:none"></div>

    <footer>
      ข้อมูล sync แบบ real-time ให้ทุกคนเห็นตรงกัน — ต้อง login ด้วย GitHub ก่อนถึงจะอัปเดตสถานะได้
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
